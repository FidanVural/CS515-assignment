# Classification Task — Default Hyperparameters
# Loaded via: python main.py --task classification --config configs/classification.yaml

task: classification
mode: train

# Data
data_dir: data/tiny-imagenet-200
num_classes: 200
img_size: 256

# Model
model_size: small         # small + SimMIM → 84.08% Top-1 paper reference
pretrained_weights: null  # Set to path of SimMIM .pth to fine-tune from

# Training
epochs: 30
batch_size: 64
lr: 1.0e-4
weight_decay: 0.05
label_smoothing: 0.1
warmup_epochs: 5
use_amp: true             # Automatic Mixed Precision (fp16) — uses A6000 efficiently

# System
device: cuda
num_workers: 8
seed: 42
log_interval: 50

# Checkpoints
checkpoint_dir: checkpoints
resume: null
results_dir: results
